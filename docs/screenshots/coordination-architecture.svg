<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f1117"/>
      <stop offset="1" stop-color="#1a1b26"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00d4ff"/>
      <stop offset="1" stop-color="#00f0ff"/>
    </linearGradient>
    <linearGradient id="rose" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d946ef"/>
      <stop offset="1" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#fbbf24"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="640" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="480" y="44" text-anchor="middle" fill="#e2e8f0" font-family="monospace" font-size="20" font-weight="bold">Myelin Coordination Architecture</text>
  <text x="480" y="64" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="11">Multi-Agent Conflict Detection for Concurrent File Edits</text>

  <!-- ═══ Layer: CLI Sessions (top) ═══ -->
  <!-- Agent A -->
  <rect x="80" y="100" width="180" height="80" rx="8" fill="#1e1f2e" stroke="#6366f1" stroke-width="1.5"/>
  <text x="170" y="128" text-anchor="middle" fill="#a5b4fc" font-family="monospace" font-size="12" font-weight="bold">Agent A</text>
  <text x="170" y="146" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">Claude Code Session</text>
  <text x="170" y="166" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="9">editing: src/api.ts</text>

  <!-- Agent B -->
  <rect x="390" y="100" width="180" height="80" rx="8" fill="#1e1f2e" stroke="#d946ef" stroke-width="1.5"/>
  <text x="480" y="128" text-anchor="middle" fill="#f0abfc" font-family="monospace" font-size="12" font-weight="bold">Agent B</text>
  <text x="480" y="146" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">Claude Code Session</text>
  <text x="480" y="166" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="9">editing: src/api.ts</text>

  <!-- Agent C -->
  <rect x="700" y="100" width="180" height="80" rx="8" fill="#1e1f2e" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="790" y="128" text-anchor="middle" fill="#67e8f9" font-family="monospace" font-size="12" font-weight="bold">Agent C</text>
  <text x="790" y="146" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">Gemini CLI Session</text>
  <text x="790" y="166" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">editing: src/utils.ts</text>

  <!-- ═══ Arrows: Sessions → Hook Layer ═══ -->
  <line x1="170" y1="180" x2="170" y2="230" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.6"/>
  <line x1="480" y1="180" x2="480" y2="230" stroke="#d946ef" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.6"/>
  <line x1="790" y1="180" x2="790" y2="230" stroke="#00d4ff" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.6"/>

  <!-- ═══ Layer: Hook Interceptors ═══ -->
  <rect x="60" y="230" width="840" height="60" rx="8" fill="#1a1b26" stroke="#334155" stroke-width="1"/>
  <text x="480" y="250" text-anchor="middle" fill="#94a3b8" font-family="monospace" font-size="10" font-weight="bold">HOOK INTERCEPTORS</text>

  <text x="170" y="272" text-anchor="middle" fill="#a5b4fc" font-family="monospace" font-size="9">PreToolUse: Write</text>
  <text x="480" y="272" text-anchor="middle" fill="#f0abfc" font-family="monospace" font-size="9">PreToolUse: Write</text>
  <text x="790" y="272" text-anchor="middle" fill="#67e8f9" font-family="monospace" font-size="9">user_prompt_submit</text>

  <!-- Arrow: Hooks → Coordination -->
  <line x1="480" y1="290" x2="480" y2="330" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowAmber)"/>
  <defs><marker id="arrowAmber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6" fill="#f59e0b"/>
  </marker></defs>

  <!-- ═══ Layer: Coordination Core ═══ -->
  <rect x="200" y="330" width="560" height="120" rx="10" fill="#1e1f2e" stroke="#f59e0b" stroke-width="2" filter="url(#glow)"/>
  <text x="480" y="356" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="13" font-weight="bold">Coordination Engine</text>
  <text x="480" y="373" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">ext-repo/myelin/coordination/</text>

  <!-- Three sub-modules -->
  <rect x="220" y="385" width="150" height="50" rx="6" fill="#0f1117" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="295" y="406" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="10" font-weight="bold">workspace.py</text>
  <text x="295" y="422" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="8">Shared State Tracker</text>

  <rect x="400" y="385" width="150" height="50" rx="6" fill="#0f1117" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="475" y="406" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="10" font-weight="bold">resolver.py</text>
  <text x="475" y="422" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="8">Conflict Detector</text>

  <rect x="580" y="385" width="160" height="50" rx="6" fill="#0f1117" stroke="#f59e0b" stroke-width="0.8"/>
  <text x="660" y="406" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="10" font-weight="bold">observer.py</text>
  <text x="660" y="422" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="8">Event Observer</text>

  <!-- ═══ Conflict callout ═══ -->
  <rect x="310" y="470" width="340" height="44" rx="6" fill="#451a03" stroke="#f59e0b" stroke-width="1"/>
  <text x="480" y="489" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="10" font-weight="bold">CONFLICT DETECTED</text>
  <text x="480" y="503" text-anchor="middle" fill="#fcd34d" font-family="monospace" font-size="9">Agent A &amp; B both writing src/api.ts</text>

  <!-- Arrow down from conflict -->
  <line x1="480" y1="514" x2="480" y2="544" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowRed)"/>
  <defs><marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6" fill="#ef4444"/>
  </marker></defs>

  <!-- ═══ Resolution ═══ -->
  <rect x="300" y="544" width="360" height="50" rx="8" fill="#1e1f2e" stroke="#4ade80" stroke-width="1.5"/>
  <text x="480" y="566" text-anchor="middle" fill="#4ade80" font-family="monospace" font-size="11" font-weight="bold">Resolution: Block / Warn / Merge</text>
  <text x="480" y="582" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">Agent B gets: "Wait — Agent A is editing this file"</text>

  <!-- Side arrows back from coordination to agents -->
  <path d="M200,390 L100,390 L100,180" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4 3" opacity="0.4" fill="none" marker-end="url(#arrowAmberSm)"/>
  <path d="M760,390 L860,390 L860,180" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4 3" opacity="0.4" fill="none" marker-end="url(#arrowAmberSm)"/>
  <defs><marker id="arrowAmberSm" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
    <path d="M0,0 L6,2.5 L0,5" fill="#f59e0b"/>
  </marker></defs>

  <!-- Labels on side arrows -->
  <text x="68" y="300" fill="#f59e0b" font-family="monospace" font-size="8" opacity="0.7" transform="rotate(-90 68 300)">status feedback</text>
  <text x="892" y="300" fill="#f59e0b" font-family="monospace" font-size="8" opacity="0.7" transform="rotate(-90 892 300)">status feedback</text>

  <!-- Footer -->
  <text x="480" y="626" text-anchor="middle" fill="#475569" font-family="monospace" font-size="9">Enabled via experimental flag: experimental_myelin_coordination</text>
</svg>
